<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dearly — Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #1e1e1e;
      --surface: #2d2d2d;
      --card: #282828;
      --border: #3c4043;
      --accent: #a8c7fa;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --success: #81c995;
      --warning: #f28b82;
    }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0; padding: 32px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 32px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }
    .header h1 { font-weight: 400; font-size: 1.5rem; margin: 0; }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 24px;
      margin-bottom: 32px;
    }
    
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      text-align: center;
    }
    .stat-val { font-size: 2.5rem; font-weight: 300; color: var(--accent); margin-bottom: 8px;}
    .stat-label { font-size: 0.85rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px;}

    .sections {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 32px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px;
      max-height: 500px;
      overflow-y: auto;
    }
    .panel h2 { font-size: 1.1rem; margin: 0 0 16px; font-weight: 500; color: var(--text); border-bottom: 1px solid var(--border); padding-bottom: 12px;}

    table { widdth: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
    th { color: var(--muted); font-weight: 500; border-bottom: 1px solid var(--border); padding: 8px 4px; }
    td { padding: 12px 4px; border-bottom: 1px solid rgba(60,64,67,0.5); color: var(--text); }
    .title-col { max-width: 200px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .err-msg { color: var(--warning); padding: 16px; border: 1px solid var(--warning); border-radius: 8px; background: rgba(242, 139, 130, 0.1); margin-bottom: 24px;}
  </style>
</head>
<body>

<div class="header">
  <h1>Dearly Data</h1>
  <button onclick="loadData()" style="padding: 8px 16px; background: var(--accent); color: #000; border: none; border-radius: 4px; cursor: pointer;">Refresh Data</button>
</div>

<div id="errorBox" class="err-msg" style="display:none;"></div>

<div class="stats-grid">
  <div class="stat-card">
    <div class="stat-val" id="valCopies">0</div>
    <div class="stat-label">Total Notes Copied</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="valRatings">0</div>
    <div class="stat-label">Total Idea Ratings</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="valSessions" style="color:var(--success)">0</div>
    <div class="stat-label">Active Conversion Sessions</div>
  </div>
  <div class="stat-card">
    <div class="stat-val" id="valAvgRating" style="color:#fbbc04">—</div>
    <div class="stat-label">Global Avg Rating</div>
  </div>
</div>

<div class="sections">
  <div class="panel">
    <h2>Top Performing Ideas (Copied)</h2>
    <table style="width:100%">
      <thead><tr><th>Idea Concept</th><th>Copies</th><th>Avg Rating</th></tr></thead>
      <tbody id="topIdeasBody"></tbody>
    </table>
  </div>
  
  <div class="panel">
    <h2>Recent Conversion Logs</h2>
    <table style="width:100%">
      <thead><tr><th>Event</th><th>Location / Session</th><th>Time</th></tr></thead>
      <tbody id="logsBody"></tbody>
    </table>
  </div>
</div>

<script>
  const API_KEY = "dearly_admin_2026"; // Simple static auth match

  async function loadData() {
    document.getElementById('errorBox').style.display = 'none';
    
    try {
      const res = await fetch(`http://127.0.0.1:8000/api/admin/metrics?api_key=${API_KEY}`);
      if (!res.ok) throw new Error(`API Error: ${res.status}`);
      
      const data = await res.json();
      
      if (!data.supabase_connected) {
         document.getElementById('errorBox').textContent = data.message || data.error;
         document.getElementById('errorBox').style.display = 'block';
         return;
      }
      if (data.error) {
         document.getElementById('errorBox').textContent = data.error;
         document.getElementById('errorBox').style.display = 'block';
      }

      document.getElementById('valCopies').textContent = data.total_note_copies || 0;
      document.getElementById('valRatings').textContent = data.total_ratings || 0;
      document.getElementById('valSessions').textContent = data.unique_sessions || 0;

      // Calculate global rating
      let globalAvg = "—";
      if (data.rating_distribution) {
          let sum = 0, count = 0;
          for (const [stars, n] of Object.entries(data.rating_distribution)) {
              sum += (parseInt(stars) * n);
              count += n;
          }
          if (count > 0) globalAvg = (sum/count).toFixed(1) + " ★";
      }
      document.getElementById('valAvgRating').textContent = globalAvg;

      // Popualte Top Ideas
      const ideasBody = document.getElementById('topIdeasBody');
      ideasBody.innerHTML = '';
      
      const copiesDict = data.per_idea_copies || {};
      const ratingDict = data.per_idea_avg_rating || {};
      
      const sortedIdeas = Object.entries(copiesDict).sort((a,b) => b[1] - a[1]);
      sortedIdeas.forEach(([title, copies]) => {
          const rating = ratingDict[title] ? ratingDict[title].toFixed(1) + " ★" : "—";
          ideasBody.innerHTML += `<tr>
            <td class="title-col" title="${title}">${title}</td>
            <td style="color:var(--accent); font-weight:500;">${copies}</td>
            <td style="color:#fbbc04">${rating}</td>
          </tr>`;
      });
      if(sortedIdeas.length === 0) ideasBody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">No data yet.</td></tr>';

      // Logs
      const logsBody = document.getElementById('logsBody');
      logsBody.innerHTML = '';
      const recent = data.recent_copies || [];
      recent.forEach(c => {
          const loc = c.user_location || c.session_id.substring(0,8)+"...";
          const time = new Date(c.copied_at).toLocaleTimeString();
          logsBody.innerHTML += `<tr>
             <td><span style="color:var(--success)">Note Copied</span></td>
             <td class="title-col" title="${loc}">${loc}</td>
             <td style="color:var(--muted)">${time}</td>
          </tr>`;
      });
      if (recent.length === 0) logsBody.innerHTML = '<tr><td colspan="3" style="color:var(--muted)">No recent logs.</td></tr>';

    } catch(e) {
         document.getElementById('errorBox').textContent = "Failed to fetch metrics: " + e.message;
         document.getElementById('errorBox').style.display = 'block';
    }
  }

  loadData();
</script>
</body>
</html>
