<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dearly — Premium Gifting Assistant</title>
  <!-- Using Google Sans/Roboto like Google AI Studio -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  <!-- Material Icons -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #1e1e1e;
      --sidebar: #191919;
      --surface: #2d2d2d;
      --card: #282828;
      --border: #3c4043;
      --accent: #a8c7fa; 
      --accent-hover: #aecbfa;
      --text: #e8eaed;
      --muted: #9aa0a6;
      --user-bubble: #004a77; 
      --bot-bubble: #1e1e1e;
      --idea-card: #202124;
      --success: #81c995;
      --warning: #f28b82;
    }

    html, body { height: 100%; }

    body {
      font-family: 'Roboto', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 280px;
      min-width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      flex-shrink: 0;
      transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1), min-width 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.2s ease;
      overflow: hidden;
      position: relative;
    }
    .sidebar.collapsed {
      width: 0;
      min-width: 0;
      opacity: 0;
      border-right: none;
      pointer-events: none;
    }

    .account-profile {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-avatar {
      width: 36px; height: 36px;
      background: var(--accent);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #000;
      font-weight: 700;
      font-size: 1.1rem;
    }
    .profile-info {
      display: flex; flex-direction: column;
    }
    .profile-name { font-size: 0.95rem; font-weight: 500; color: var(--text); }
    .profile-plan { font-size: 0.75rem; color: var(--accent); font-weight: 500;}

    .sidebar-content {
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      flex: 1;
      overflow-y: auto;
    }

    .btn-new-chat {
      width: 100%;
      padding: 10px;
      border-radius: 24px;
      font-size: 0.85rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; gap: 8px; justify-content: flex-start;
      padding-left: 16px;
      transition: background 0.2s;
    }
    .btn-new-chat:hover { background: rgba(168,199,250, 0.08); }

    .sidebar-section { display: flex; flex-direction: column; gap: 8px; }
    .sidebar-label {
      font-size: 0.75rem;
      color: var(--muted);
      font-weight: 500;
      padding: 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .history-list {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .history-item {
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      gap: 4px;
      transition: background 0.2s;
    }
    .history-item:hover { background: var(--surface); }
    .history-title { font-size: 0.85rem; color: var(--text); font-weight: 500; }
    .history-idea { font-size: 0.75rem; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Main Chat Area ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      /* Vibrant animated gradient background */
      background: linear-gradient(-45deg, #091321, #0a1f35, #120921, #1e1b3a, #0d1117);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .chat-header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(60, 64, 67, 0.4);
      display: flex;
      align-items: center;
      gap: 16px;
      /* Glassmorphism */
      background: rgba(30, 30, 30, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      z-index: 10;
    }
    .btn-toggle {
      background: transparent;
      border: none;
      color: var(--text);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      border-radius: 4px;
    }
    .btn-toggle:hover { background: rgba(255,255,255,0.1); }
    .chat-header h2 { font-size: 1.1rem; font-weight: 400; color: var(--text); }

    /* Messages */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 32px 15%; 
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }
    @media (max-width: 900px) { .messages { padding: 24px; } }
    .messages::-webkit-scrollbar { width: 6px; }
    .messages::-webkit-scrollbar-track { background: transparent; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg-row {
      display: flex;
      gap: 16px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .msg-row.user { flex-direction: row-reverse; }

    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      color: #fff;
    }
    .msg-avatar.bot { background: linear-gradient(135deg, #4285F4, #34A853); } 
    .msg-avatar.user { background: var(--border); }

    .msg-bubble {
      max-width: 80%;
      padding: 14px 18px;
      border-radius: 8px;
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .msg-bubble.bot {
      background: transparent;
      color: var(--text);
      padding: 4px 0; 
    }
    .msg-bubble.user {
      background: var(--user-bubble);
      border-radius: 18px 18px 4px 18px;
      color: #fff;
    }

    .msg-bubble.guardrail { color: var(--warning); font-style: italic; }
    .msg-bubble.paywall { 
      background: rgba(242, 139, 130, 0.1); 
      border: 1px solid var(--warning); 
      color: var(--warning); 
      padding: 14px 18px; 
      border-radius: 8px;
    }

    .typing-indicator { display: flex; align-items: center; gap: 4px; padding: 4px 0; }
    .typing-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s infinite;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.5; } 40% { transform: translateY(-4px); opacity: 1; } }

    /* Gift idea cards */
    .ideas-container {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 12px;
      width: 100%;
      max-width: 600px;
    }
    .idea-card {
      background: var(--idea-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      cursor: pointer;
      position: relative;
    }
    .idea-card:hover { border-color: var(--muted); }
    .idea-card.selected { border-color: var(--accent); background: rgba(168,199,250,0.05); }

    .idea-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .confidence-badge {
      font-size: 0.7rem;
      background: rgba(168, 199, 250, 0.15);
      color: var(--accent);
      padding: 4px 8px;
      border-radius: 12px;
      font-weight: 500;
      backdrop-filter: blur(4px);
    }

    .idea-title { font-size: 1rem; font-weight: 500; color: var(--accent); }
    .idea-reasoning { font-size: 0.9rem; color: var(--text); line-height: 1.5; }
    
    .rating-wrap {
       display: none;
       margin-top: 12px;
       padding-top: 12px;
       border-top: 1px dashed var(--border);
       align-items: center;
       justify-content: space-between;
    }
    .idea-card.selected .rating-wrap { display: flex; }
    
    .stars { display: flex; gap: 4px; }
    .star { cursor: pointer; color: var(--muted); font-size: 20px; transition: color 0.2s; }
    .star:hover, .star.active { color: #fbbc04; }

    .idea-actions { display: flex; gap: 8px; margin-top: 16px; }

    .btn-secondary, .btn-primary {
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      border-radius: 4px;
      cursor: pointer;
      display: inline-flex; align-items: center; gap: 6px;
      border: none;
    }
    .btn-secondary { background: var(--bg); color: var(--accent); border: 1px solid var(--border); }
    .btn-secondary:hover { background: rgba(168,199,250,0.04); }
    .btn-secondary:disabled { opacity: 0.5; cursor: not-allowed; pointer-events: none; }
    .btn-primary { background: var(--accent); color: #000; }
    .btn-primary:hover { background: var(--accent-hover); }

    /* Note modal */
    .note-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.4);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    .note-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 32px;
      max-width: 500px;
      width: 90%;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .note-modal h3 { font-size: 1.1rem; font-weight: 400; margin-bottom: 24px; color: var(--text); }
    .note-text {
      font-size: 1rem;
      line-height: 1.6;
      color: var(--text);
      font-style: italic;
      background: var(--bg);
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      border: 1px solid var(--border);
    }
    .note-actions { display: flex; gap: 12px; justify-content: flex-end; }

    /* Input area */
    .input-area {
      padding: 16px 15% 24px; 
      /* Glassmorphism */
      background: rgba(30, 30, 30, 0.3);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-top: 1px solid rgba(60, 64, 67, 0.4);
      z-index: 10;
    }
    @media (max-width: 900px) { .input-area { padding: 16px 24px 24px; } }
    .input-wrap {
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--surface);
      border-radius: 24px;
      padding: 8px 16px;
    }
    .chat-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'Roboto', sans-serif;
      font-size: 0.95rem;
      resize: none;
      min-height: 24px;
      max-height: 150px;
      line-height: 1.5;
      padding: 6px 0;
    }
    .chat-input::placeholder { color: var(--muted); }
    .btn-send {
      width: 36px; height: 36px;
      border-radius: 50%;
      border: none;
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .btn-send:hover { background: rgba(168,199,250,0.08); }
    .btn-send:disabled { color: var(--border); cursor: not-allowed; }
  </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
  <div class="account-profile" style="min-width: 280px;">
    <div class="profile-avatar">S</div>
    <div class="profile-info">
      <div class="profile-name">Samarth</div>
      <div class="profile-plan">Dearly Premium</div>
    </div>
  </div>

  <div class="sidebar-content" style="min-width: 280px;">
    <button class="btn-new-chat" onclick="startNewChat()">
      <span class="material-icons">add</span> New Conversation
    </button>

    <div class="sidebar-section">
      <div class="sidebar-label">Successful Sessions</div>
      <div class="history-list" id="historyList">
        <div style="color:var(--muted); font-size:0.8rem; padding: 0 8px;">No sessions yet. Generate and copy a note to save it here.</div>
      </div>
    </div>
  </div>
</aside>

<main class="main">
  <div class="chat-header">
    <button class="btn-toggle" onclick="toggleSidebar()"><span class="material-icons">menu</span></button>
    <h2>Gifting Assistant</h2>
  </div>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="input-wrap">
      <textarea class="chat-input" id="chatInput" placeholder="Ask for a gift idea..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="btn-send" id="btnSend" onclick="sendMessage()"><span class="material-icons">send</span></button>
    </div>
  </div>
</main>

<div class="note-overlay" id="noteOverlay" style="display:none;" onclick="closeNoteOnBackdrop(event)">
  <div class="note-modal">
    <h3>Generated Note</h3>
    <p class="note-text" id="noteText">Generating...</p>
    <div class="note-actions">
      <button class="btn-secondary" onclick="closeNote()">Close</button>
      <button class="btn-primary" id="btnCopy" onclick="copyNote()">
        <span class="material-icons">content_copy</span> <span id="copyLabel">Copy Text</span>
      </button>
    </div>
  </div>
</div>

<script>
  const BASE = 'http://127.0.0.1:8000';
  let sessionId = generateSessionId();
  let selectedIdea = null;

  function toggleSidebar() {
      document.getElementById('sidebar').classList.toggle('collapsed');
  }

  function generateSessionId() {
    return 'sess_' + Math.random().toString(36).slice(2, 11);
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 150) + 'px';
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  }

  function appendMessage(role, html, type = 'conversation') {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = `msg-row ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `msg-avatar ${role}`;
    avatar.innerHTML = role === 'bot' ? '<span class="material-icons" style="font-size:18px;">auto_awesome</span>' : '<span class="material-icons" style="font-size:18px;">person</span>';

    const bubble = document.createElement('div');
    bubble.className = `msg-bubble ${role}`;
    if (type === 'guardrail') bubble.classList.add('guardrail');
    if (type === 'paywall') bubble.classList.add('paywall');
    bubble.innerHTML = html;

    if(role === 'user') { row.appendChild(bubble); row.appendChild(avatar); } 
    else { row.appendChild(avatar); row.appendChild(bubble); }

    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
    return bubble;
  }

  function showTyping() {
    const row = document.createElement('div');
    row.className = 'msg-row bot';
    row.id = 'typingRow';
    row.innerHTML = `<div class="msg-avatar bot"><span class="material-icons" style="font-size:18px;">auto_awesome</span></div>
                     <div class="msg-bubble bot"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div>`;
    document.getElementById('messages').appendChild(row);
    row.scrollIntoView();
  }

  function hideTyping() { const t = document.getElementById('typingRow'); if (t) t.remove(); }

  // Draw Idea Cards
  function renderIdeas(message, ideas) {
    const messages = document.getElementById('messages');
    const row = document.createElement('div');
    row.className = 'msg-row bot';

    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar bot';
    avatar.innerHTML = '<span class="material-icons" style="font-size:18px;">auto_awesome</span>';

    const wrap = document.createElement('div');
    wrap.style.width = '100%';

    const intro = document.createElement('div');
    intro.className = 'msg-bubble bot';
    intro.textContent = message;
    wrap.appendChild(intro);

    const container = document.createElement('div');
    container.className = 'ideas-container';
    
    // Create a container group ID so we know which generation batch this is
    const batchId = `batch-${Date.now()}`;

    ideas.forEach((idea, i) => {
      const cardId = `idea-${batchId}-${i}`;
      
      const card = document.createElement('div');
      card.className = 'idea-card';
      card.id = cardId;
      // Store the occasion specifically for this generation batch in the div if it exists
      if (document.lastOccasion) card.dataset.occasion = document.lastOccasion;
      
      card.innerHTML = `
        <div class="idea-header">
          <div class="idea-title">${idea.title}</div>
          <div class="confidence-badge">${idea.confidence_score || 90}% Match</div>
        </div>
        <div class="idea-reasoning">${idea.reasoning}</div>
        <div class="rating-wrap" id="rating-${cardId}">
          <span style="font-size:0.8rem;color:var(--muted)">Rate this idea:</span>
          <div class="stars">
            ${[1,2,3,4,5].map(n => `<span class="material-icons star" onclick="rateIdea('${idea.title}', ${n}, '${cardId}')" id="star-${cardId}-${n}">star_border</span>`).join('')}
          </div>
          <span id="rate-msg-${cardId}" style="font-size:0.75rem;color:var(--success);display:none;">Thanks!</span>
        </div>`;
      
      card.onclick = (e) => {
          if (e.target.classList.contains('star')) return; 
          selectIdea(cardId, idea);
      };
      container.appendChild(card);
    });

    const actionsRow = document.createElement('div');
    actionsRow.className = 'idea-actions';

    // The button stays active regardless of future generations/paywalls.
    const btnNote = document.createElement('button');
    btnNote.className = 'btn-primary btn-note-trigger'; 
    btnNote.disabled = true; // wait until card clicked
    btnNote.innerHTML = '<span class="material-icons">edit_note</span> Personalised text';
    btnNote.onclick = () => openNoteModal();

    const btnDiff = document.createElement('button');
    btnDiff.className = 'btn-secondary btn-diff-trigger';
    btnDiff.innerHTML = '<span class="material-icons">refresh</span> Try Different Ideas';
    btnDiff.onclick = (e) => {
        // Only disable the "Try Different Ideas" button on this specific block
        e.currentTarget.disabled = true;
        regenerateIdeas();
    };

    actionsRow.appendChild(btnNote);
    actionsRow.appendChild(btnDiff);
    container.appendChild(actionsRow);

    wrap.appendChild(container);
    row.appendChild(avatar);
    row.appendChild(wrap);
    messages.appendChild(row);
    messages.scrollTop = messages.scrollHeight;
  }

  function selectIdea(cardId, idea) {
    document.querySelectorAll('.idea-card').forEach(c => c.classList.remove('selected'));
    document.getElementById(cardId).classList.add('selected');
    selectedIdea = idea;
    
    // Enable all "Personalised text" buttons across the chat history so the user can easily click any of them
    document.querySelectorAll('.btn-note-trigger').forEach(b => b.disabled = false);
  }
  
  async function rateIdea(title, rating, cardId) {
      for (let i = 1; i <= 5; i++) {
          const star = document.getElementById(`star-${cardId}-${i}`);
          if (i <= rating) { star.classList.add('active'); star.textContent = 'star'; }
          else { star.classList.remove('active'); star.textContent = 'star_border'; }
      }
      
      try {
          await fetch(`${BASE}/api/metrics/rate`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ session_id: sessionId, idea_title: title, rating: rating })
          });
          const msg = document.getElementById(`rate-msg-${cardId}`);
          msg.style.display = 'block';
          setTimeout(()=> msg.style.display='none', 2000);
      } catch(e) {}
  }

  async function callChatAPI(msg, isRegeneration = false) {
    showTyping();
    try {
      const res = await fetch(`${BASE}/api/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ session_id: sessionId, message: msg, location: null, is_regeneration: isRegeneration })
      });
      const data = await res.json();
      hideTyping();

      if (data.type === 'gift_ideas') {
        document.lastOccasion = data.occasion || "Gift Idea"; // store for history
        renderIdeas(data.message, data.ideas || []);
      } else if (data.type === 'guardrail') {
        appendMessage('bot', data.message, 'guardrail');
      } else if (data.type === 'paywall') {
        appendMessage('bot', data.message, 'paywall');
        // Do NOT disable the "Personalised text" buttons here. The user can just scroll up and click one.
      } else if (data.type === 'error') {
        appendMessage('bot', data.message, 'guardrail');
      } else {
        appendMessage('bot', data.message);
      }
    } catch (e) {
      hideTyping();
      appendMessage('bot', 'Network error. Please check the backend.', 'guardrail');
    }
  }

  async function sendMessage() {
    const input = document.getElementById('chatInput');
    const msg = input.value.trim();
    if (!msg) return;

    input.value = ''; input.style.height = 'auto';
    document.getElementById('btnSend').disabled = true;

    appendMessage('user', msg);
    await callChatAPI(msg, false);

    document.getElementById('btnSend').disabled = false;
    document.getElementById('chatInput').focus();
  }

  function regenerateIdeas() {
      const msg = "Can you suggest some different ideas based on that?";
      appendMessage('user', msg);
      callChatAPI(msg, true);
  }

  // Note Modal
  let currentNoteText = '';
  async function openNoteModal() {
    if (!selectedIdea) return;
    
    document.getElementById('noteText').textContent = 'Writing...';
    document.getElementById('noteOverlay').style.display = 'flex';
    document.getElementById('btnCopy').disabled = true;
    document.getElementById('btnCopy').style.background = 'var(--accent)';
    document.getElementById('copyLabel').textContent = 'Copy Text';

    try {
      const res = await fetch(`${BASE}/api/note`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          idea_title: selectedIdea.title,
          idea_reasoning: selectedIdea.reasoning,
          recipient_name: 'them'
        })
      });
      const data = await res.json();
      currentNoteText = data.note || 'Error';
      document.getElementById('noteText').textContent = currentNoteText;
      document.getElementById('btnCopy').disabled = false;
    } catch (e) {
      document.getElementById('noteText').textContent = 'Error sending request.';
    }
  }

  function closeNote() { document.getElementById('noteOverlay').style.display = 'none'; }
  function closeNoteOnBackdrop(e) { if (e.target.id === 'noteOverlay') closeNote(); }

  // ── Session History Logic (Local Storage) ──
  function loadHistory() {
      const historyJSON = localStorage.getItem('dearly_sessions');
      const list = document.getElementById('historyList');
      if (!historyJSON) {
          list.innerHTML = '<div style="color:var(--muted); font-size:0.8rem; padding: 0 8px;">No sessions yet. Generate and copy a note to save it here.</div>';
          return;
      }
      const history = JSON.parse(historyJSON);
      if (history.length === 0) return;
      
      list.innerHTML = '';
      // Reverse array to show newest first
      [...history].reverse().forEach(item => {
          const div = document.createElement('div');
          div.className = 'history-item';
          div.innerHTML = `
              <div class="history-title">${item.occasion || "Gift Idea"}</div>
              <div class="history-idea">${item.ideaTitle || "Unknown"}</div>
          `;
          div.onclick = () => {
              // Simply open the modal to display what they generated in the past
              document.getElementById('noteText').textContent = item.noteContext;
              document.getElementById('noteOverlay').style.display = 'flex';
              document.getElementById('btnCopy').style.display = 'none'; // hide copy btn when viewing history
          };
          list.appendChild(div);
      });
  }

  function saveToHistory(ideaTitle, noteText) {
      // Find the selected card to get its occasion
      const selectedCard = document.querySelector('.idea-card.selected');
      let occasion = selectedCard ? selectedCard.dataset.occasion : (document.lastOccasion || "Gift Idea");

      let history = [];
      try { history = JSON.parse(localStorage.getItem('dearly_sessions')) || []; } catch(e){}
      
      history.push({
          id: sessionId,
          occasion: occasion,
          ideaTitle: ideaTitle,
          noteContext: noteText,
          timestamp: Date.now()
      });
      localStorage.setItem('dearly_sessions', JSON.stringify(history));
      loadHistory();
  }

  async function copyNote() {
    if (!currentNoteText) return;
    try { await navigator.clipboard.writeText(currentNoteText); } catch(e) {}

    document.getElementById('btnCopy').style.background = 'var(--success)';
    document.getElementById('copyLabel').textContent = 'Copied!';

    // Save to local history sidebar
    saveToHistory(selectedIdea.title, currentNoteText);

    // Send to global metric endpoint
    try {
      await fetch(`${BASE}/api/metrics/note-copied`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          session_id: sessionId,
          idea_title: selectedIdea.title,
          user_location: null
        })
      });
    } catch (e) {}

    setTimeout(() => {
        closeNote();
        document.getElementById('btnCopy').style.background = 'var(--accent)';
        document.getElementById('copyLabel').textContent = 'Copy Text';
        document.getElementById('btnCopy').style.display = 'flex'; // Reset display state
    }, 1500);
  }

  // Greeting
  function startNewChat() {
    sessionId = generateSessionId();
    selectedIdea = null;
    document.getElementById('messages').innerHTML = '';
    setTimeout(() => callChatAPI('hi', false), 500);
  }

  // Init
  loadHistory();
  startNewChat();
</script>
</body>
</html>
